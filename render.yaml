services:
  - type: web
    name: anthola-backend
    env: node
    plan: free
    buildCommand: >
      export VITE_API_BASE_URL=https://anthola-tours-and-travel.onrender.com &&
      export VITE_SOCKET_URL=https://anthola-tours-and-travel.onrender.com &&
      cd anthola_fullstack/frontend &&
      npm install &&
      npm run build &&
      cd ../backend &&
      npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://anthola-tours-and-travel.onrender.com
      - key: FRONTEND_URL
        value: https://anthola-tours-and-travel.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: SEAT_LOCK_MINUTES
        value: 5
